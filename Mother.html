<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ⭐ LINE 分享預覽 -->
<meta property="og:title" content="母親節快樂 💖">
<meta property="og:description" content="點開這張卡片看看 ❤️">
<meta property="og:image" content="https://images.unsplash.com/photo-1524253482453-3fed8d2fe12b">
<meta property="og:url" content="https://你的網址.github.io/mother/">

<title>母親節卡片</title>

<style>
body{
  margin:0;
  background:linear-gradient(#ffdde1,#ee9ca7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:sans-serif;
}

/* 卡片 */
.card{
  width:340px;
  height:520px;
  perspective:1000px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

/* 點擊開卡 */
.card.open .inner{
  transform:rotateY(180deg);
}

.front, .back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  overflow:hidden;
}

/* 正面 */
.front{
  background:#e91e63;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
}

/* 背面 */
.back{
  background:white;
  transform:rotateY(180deg);
  padding:10px;
  text-align:center;
}

/* 照片 */
.photo{
  width:100%;
  border-radius:15px;
}

/* 影片 */
iframe{
  width:100%;
  height:150px;
  border-radius:10px;
  margin-top:8px;
}

/* 文字 */
.message{
  margin:8px 0;
  font-size:18px;
}

/* 按鈕 */
button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#e91e63;
  color:white;
  margin:4px;
}

/* 愛心動畫 */
.heart{
  position:absolute;
  color:red;
  animation:float 5s linear;
}

@keyframes float{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-600px);opacity:0;}
}
</style>
</head>

<body>

<!-- 🎵 背景音樂（免費） -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<div class="card" onclick="openCard()">
  <div class="inner">

    <!-- 正面 -->
    <div class="front">
      💖 點我打開卡片 💖
    </div>

    <!-- 背面 -->
    <div class="back">

      <!-- 📸 照片（改這裡） -->
      <img class="photo"
           src="https://images.unsplash.com/photo-1511895426328-dc8714191300">

      <!-- 💬 祝福文字 -->
      <div class="message" id="msg">
        媽媽我愛你 ❤️
      </div>

      <input id="input" placeholder="輸入祝福">

      <br>

      <button onclick="updateText(event)">更新</button>
      <button onclick="share(event)">LINE分享</button>

      <!-- 🎥 影片（改這裡） -->
      
	  <iframe width="560" height="315" src="https://www.youtube.com/embed/qBYq1XkSBg0?si=xt2hSgCrgdaq0P62" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>

  </div>
</div>

<script>

// 開卡 + 播音樂
function openCard(){
  document.querySelector(".card").classList.add("open");
  document.getElementById("music").play();
}

// 更新文字
function updateText(e){
  e.stopPropagation();
  let t=document.getElementById("input").value;
  document.getElementById("msg").innerText = t || "媽媽我愛你 ❤️";
}

// LINE 分享
function share(e){
  e.stopPropagation();
  let url=window.location.href;
  window.open("https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url));
}

// 愛心動畫
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  h.style.top="100vh";
  h.style.fontSize=(15+Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},400);

</script>

</body>
</html>
