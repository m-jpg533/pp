<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- LINE 分享預覽（重點） -->
<meta property="og:title" content="母親節快樂 💖">
<meta property="og:description" content="點開看看我給媽媽的祝福 ❤️">
<meta property="og:image" content="https://i.imgur.com/8Km9tLL.jpg">
<meta property="og:url" content="https://你的網址.github.io/mother/">

<title>母親節卡片</title>

<style>
body{
  margin:0;
  background:linear-gradient(#ffdde1,#ee9ca7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:sans-serif;
}

/* 卡片外 */
.card{
  width:320px;
  height:480px;
  perspective:1000px;
}

/* 卡片翻開 */
.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:1s;
}

.card:hover .inner{
  transform:rotateY(180deg);
}

/* 正面 */
.front, .back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:20px;
  overflow:hidden;
}

/* 正面 */
.front{
  background:#e91e63;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
}

/* 背面 */
.back{
  background:white;
  transform:rotateY(180deg);
  padding:15px;
  text-align:center;
}

/* 照片 */
.photo{
  width:100%;
  border-radius:15px;
}

/* 文字 */
.message{
  margin:10px 0;
  font-size:18px;
}

/* 按鈕 */
button{
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:#e91e63;
  color:white;
  margin:5px;
}

/* 愛心動畫 */
.heart{
  position:absolute;
  color:red;
  animation:float 5s infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}
</style>
</head>

<body>

<!-- 音樂 -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="card">
  <div class="inner">

    <!-- 正面 -->
    <div class="front">
      💖 點我打開 💖
    </div>

    <!-- 背面 -->
    <div class="back">

      <!-- 你的照片 -->
      <img class="photo" src="https://images.unsplash.com/photo-1511895426328-dc8714191300">

      <!-- 祝福 -->
      <div class="message" id="msg">
        媽媽我愛你 ❤️
      </div>

      <!-- 輸入 -->
      <input id="input" placeholder="輸入祝福">

      <br>

      <button onclick="update()">更新</button>
      <button onclick="share()">LINE分享</button>

    </div>

  </div>
</div>

<!-- 愛心 -->
<script>
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.top="100vh";
  heart.style.fontSize=(20+Math.random()*20)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),5000);
},500);

// 更新文字
function update(){
  let t=document.getElementById("input").value;
  document.getElementById("msg").innerText = t || "媽媽我愛你 ❤️";
}

// LINE 分享
function share(){
  let url=window.location.href;
  window.open("https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url));
}
</script>

</body>
</html>
